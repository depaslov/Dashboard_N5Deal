# ────────────────────────────────────────────────────────────────────────────
# Nginx reverse proxy for N5Deal dashboard.
#
# DOMAIN PLACEHOLDER: replace `dash.your-domain.com` below with the real
# subdomain before first `docker compose up`. The setup-vm.sh helper does
# this via `sed -i` if you set DOMAIN=... at provisioning time.
#
# Two server blocks:
#   1. Port 80 — serves ACME challenge for Certbot AND redirects everything
#      else to HTTPS. Stays active forever to enable cert renewals.
#   2. Port 443 — TLS-terminated reverse proxy to the app container.
#      Commented out until you've issued the first cert; uncomment after the
#      first `docker compose run --rm certbot certonly ...` succeeds.
# ────────────────────────────────────────────────────────────────────────────

# Trust forwarded headers from this proxy chain. Hostinger VPS doesn't sit
# behind a CDN by default, but if you add Cloudflare later, set real_ip_from
# to Cloudflare's IPs instead.
real_ip_header X-Forwarded-For;
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;

# Upstream app — DNS resolves to the docker-compose service name.
upstream n5deal_app {
    server app:3000;
    keepalive 32;
}

# ── HTTP (port 80) ──────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name dash.your-domain.com;

    # Certbot ACME challenge — must come BEFORE the redirect block, otherwise
    # Let's Encrypt's HTTP-01 challenge would be redirected to HTTPS and fail
    # on first issuance (no cert yet).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS. Comment this out and proxy to the app directly
    # if you're testing without TLS on a temporary subdomain.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS (port 443) ────────────────────────────────────────────────────────
# Uncomment this entire block AFTER the first cert is issued. Pre-issuance
# the Nginx container would fail to start because the cert files don't exist
# yet — that's why this is gated.
#
